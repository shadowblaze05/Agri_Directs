<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri-Direct Upload</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #2d5016 0%, #1a3408 100%);
            min-height: 100vh;
            padding: 20px 0;
        }
        .upload-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            overflow: hidden;
            max-width: 600px;
            margin: 40px auto;
        }
        .upload-header {
            background: linear-gradient(135deg, #2d5016 0%, #1a3408 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        .upload-header h1 {
            margin: 0;
            font-size: 24px;
            font-weight: bold;
        }
        .upload-body {
            padding: 40px;
        }
        .drop-zone {
            border: 2px dashed #2d5016;
            border-radius: 8px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #f8f9fa;
        }
        .drop-zone:hover {
            background: #e8f5e9;
            border-color: #1a3408;
        }
        .drop-zone.dragover {
            background: #e8f5e9;
            border-color: #4caf50;
        }
        .drop-zone i {
            font-size: 48px;
            color: #2d5016;
            margin-bottom: 15px;
        }
        .drop-zone p {
            margin: 10px 0;
            color: #555;
        }
        .file-input-label {
            cursor: pointer;
            color: #2d5016;
            font-weight: 600;
            text-decoration: underline;
        }
        #file::-webkit-file-upload-button {
            cursor: pointer;
        }
        .btn-upload {
            background: linear-gradient(135deg, #2d5016 0%, #1a3408 100%);
            border: none;
            padding: 12px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s;
        }
        .btn-upload:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(45, 80, 22, 0.3);
            color: white;
        }
        .csv-template {
            background: #f0f7ff;
            border: 1px solid #2196F3;
            border-left: 4px solid #2196F3;
            padding: 15px;
            border-radius: 4px;
            margin-top: 20px;
        }
        .csv-template h6 {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 10px;
            color: #2196F3;
        }
        .csv-template code {
            background: white;
            padding: 10px;
            border-radius: 4px;
            display: block;
            font-size: 12px;
            overflow-x: auto;
        }
        .back-link {
            text-align: center;
            margin-top: 20px;
        }
        .back-link a {
            color: #2d5016;
            text-decoration: none;
            font-weight: 500;
        }
        .back-link a:hover {
            text-decoration: underline;
        }
        .file-name {
            margin-top: 15px;
            padding: 10px;
            background: #f8f9fa;
            border-radius: 4px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="upload-container">
        <!-- Header -->
        <div class="upload-header">
            <h1><i class="fas fa-cloud-upload-alt"></i> Upload Harvest Data</h1>
            <p>Submit CSV file with your crops and quantities</p>
        </div>

        <!-- Body -->
        <div class="upload-body">
            <!-- Flash Messages -->
            {% with messages = get_flashed_messages() %}
                {% if messages %}
                    <div class="alert alert-danger alert-dismissible fade show" role="alert">
                        <i class="fas fa-exclamation-circle"></i> {{ messages[0] }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endif %}
            {% endwith %}

            <!-- Upload Form -->
            <form method="POST" enctype="multipart/form-data" id="uploadForm">
                <!-- Drop Zone -->
                <div class="drop-zone" id="dropZone">
                    <i class="fas fa-file-csv"></i>
                    <p><strong>Click to select CSV file or drag it here</strong></p>
                    <p style="font-size: 12px; color: #999;">Only .csv files are accepted</p>
                    <input type="file" name="file" id="file" accept=".csv" class="d-none" required>
                </div>

                <!-- Selected File Display -->
                <div class="file-name" id="fileName">
                    <small>📄 Selected: <strong id="selectedName"></strong></small>
                </div>

                <!-- Upload Button -->
                <button type="submit" class="btn btn-upload w-100 text-white mt-4">
                    <i class="fas fa-arrow-up"></i> Upload File
                </button>
            </form>

            <!-- Back Link -->
            <div class="back-link">
                <a href="/dashboard">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('file');
        const fileName = document.getElementById('fileName');
        const selectedName = document.getElementById('selectedName');

        // Click to select file
        dropZone.addEventListener('click', () => fileInput.click());

        // Drag and drop
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                fileInput.files = files;
                updateFileName();
            }
        });

        // File input change
        fileInput.addEventListener('change', updateFileName);

        function updateFileName() {
            if (fileInput.files.length > 0) {
                const name = fileInput.files[0].name;
                selectedName.textContent = name;
                fileName.style.display = 'block';
            } else {
                fileName.style.display = 'none';
            }
        }
    </script>
</body>
</html>
